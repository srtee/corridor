name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build binaries
        run: |
          uv pip install --system pyinstaller
          pyinstaller --onefile corridor-terminal.py --name corridor --distpath dist
          pyinstaller --onefile corridor-server.py --name corridor-server --distpath dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/corridor
            dist/corridor-server
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
